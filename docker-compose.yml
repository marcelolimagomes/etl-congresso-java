# ─────────────────────────────────────────────────────────────────────────────
#  ETL Congresso Nacional — Infraestrutura Docker
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────────────────
  # PostgreSQL 15 — Banco de dados principal
  # ───────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: etl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-etl_congresso}
      POSTGRES_USER: ${POSTGRES_USER:-etl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etl_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etl_user} -d ${POSTGRES_DB:-etl_congresso}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - etl-network

  # ───────────────────────────────────────────────────────────────────
  # ETL App — Spring Boot
  # ───────────────────────────────────────────────────────────────────
  etl-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etl-congresso-app
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${APP_PROFILE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-etl_congresso}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-etl_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-etl_pass}
      ETL_CAMARA_BASE_URL: ${ETL_CAMARA_BASE_URL:-https://dadosabertos.camara.leg.br}
      ETL_SENADO_BASE_URL: ${ETL_SENADO_BASE_URL:-https://legis.senado.leg.br}
      ETL_CAMARA_CSV_BASE_URL: ${ETL_CAMARA_CSV_BASE_URL:-https://dadosabertos.camara.leg.br/arquivos}
      ETL_SCHEDULER_ENABLED: ${ETL_SCHEDULER_ENABLED:-true}
      ETL_SCHEDULER_CRON_CAMARA: ${ETL_SCHEDULER_CRON_CAMARA:-0 0 2 * * *}
      ETL_SCHEDULER_CRON_SENADO: ${ETL_SCHEDULER_CRON_SENADO:-0 0 3 * * *}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      JAVA_OPTS: >-
        -Xms512m
        -Xmx2g
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
    ports:
      - "${APP_PORT:-8090}:8080"
    volumes:
      - ./data/tmp:/tmp/etl
      - ./data/logs:/app/logs
      - ./open-data:/app/open-data
    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ───────────────────────────────────────────────────────────────────
  # Adminer — Interface web para PostgreSQL (apenas no profile tools)
  # ───────────────────────────────────────────────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: etl-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT:-8091}:8081"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - etl-network
    profiles:
      - tools

# ───────────────────────────────────────────────────────────────────
# Rede interna
# ───────────────────────────────────────────────────────────────────
networks:
  etl-network:
    name: etl-congresso-network
    driver: bridge
