<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
  <!--
  Template: índice paginado de proposições e matérias legislativas.
  Gerado pelo etl-congresso-java (Thymeleaf standalone).
  Serve como hub estático SEO-friendly para motores de busca.
  Após hidratação do Vue, a aplicação open-data assume a interatividade.
-->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title th:text="${seoTitle}">
      Índice de Proposições — Transparência Legislativa
    </title>
    <meta name="description" th:content="${seoDescription}" />
    <link rel="canonical" th:href="${canonicalUrl}" />

    <!-- Paginação rel=prev/next ─────────────────────────────────────────── -->
    <link
      th:if="${!#strings.isEmpty(prevUrl)}"
      rel="prev"
      th:href="${prevUrl}"
    />
    <link
      th:if="${!#strings.isEmpty(nextUrl)}"
      rel="next"
      th:href="${nextUrl}"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" th:content="${seoTitle}" />
    <meta property="og:description" th:content="${seoDescription}" />
    <meta property="og:url" th:content="${canonicalUrl}" />
    <meta
      property="og:image"
      content="https://www.translegis.com.br/og-image.png"
    />
    <meta property="og:site_name" content="Transparência Legislativa" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" th:content="${seoTitle}" />
    <meta name="twitter:description" th:content="${seoDescription}" />
    <meta
      name="twitter:image"
      content="https://www.translegis.com.br/og-image.png"
    />

    <th:block th:replace="~{fragments/head-global :: common(${globalHead})}"></th:block>

    <!-- Schema.org JSON-LD: BreadcrumbList -->
    <script
      type="application/ld+json"
      th:utext="${schemaOrgBreadcrumbJson}"
    ></script>

    <!-- Schema.org JSON-LD: ItemList -->
    <script
      type="application/ld+json"
      th:utext="${schemaOrgItemListJson}"
    ></script>

    <!-- CSS mínimo para renderização sem JavaScript -->
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: #111;
        background: #f9fafb;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }
      h1 {
        color: #1a4480;
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
      }
      .breadcrumb {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.25rem;
      }
      .breadcrumb a {
        color: #1a4480;
        text-decoration: none;
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .sep {
        color: #d1d5db;
      }
      .page-header {
        margin-bottom: 2rem;
      }
      .page-subtitle {
        color: #6b7280;
        font-size: 1rem;
        margin-top: 0.5rem;
      }
      .proposicao-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .proposicao-item {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 1rem 1.25rem;
        transition: box-shadow 0.15s;
      }
      .proposicao-item:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .item-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 0.375rem;
      }
      .item-title {
        font-weight: 700;
        color: #1a4480;
        font-size: 1rem;
        text-decoration: none;
      }
      .item-title:hover {
        text-decoration: underline;
      }
      .badge {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.7rem;
        font-weight: 600;
      }
      .badge-camara {
        background: #dcfce7;
        color: #166534;
      }
      .badge-senado {
        background: #dbeafe;
        color: #1e40af;
      }
      .item-ementa {
        font-size: 0.875rem;
        color: #374151;
        line-height: 1.5;
        margin: 0;
      }
      .item-situacao {
        font-size: 0.75rem;
        color: #6b7280;
        margin-top: 0.25rem;
      }
      /* Paginação */
      .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.75rem;
        margin-top: 2.5rem;
        flex-wrap: wrap;
      }
      .pagination a,
      .pagination span {
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-weight: 500;
        border: 1px solid #d1d5db;
        text-decoration: none;
        color: #374151;
      }
      .pagination a:hover {
        background: #f3f4f6;
      }
      .pagination .current {
        background: #1a4480;
        color: #fff;
        border-color: #1a4480;
      }
      .pagination .disabled {
        color: #9ca3af;
        cursor: default;
        pointer-events: none;
      }
      .pagination-info {
        text-align: center;
        font-size: 0.875rem;
        color: #6b7280;
        margin-top: 1rem;
      }
      /* Gerado por */
      .generated-at {
        margin-top: 3rem;
        font-size: 0.75rem;
        color: #9ca3af;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Breadcrumb ──────────────────────────────────────────────────── -->
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/">Início</a>
        <span class="sep">/</span>
        <a href="/proposicoes">Proposições</a>
        <span class="sep">/</span>
        <span>Índice</span>
        <th:block th:if="${currentPage > 1}">
          <span class="sep">/</span>
          <span th:text="${'Página ' + currentPage}">Página 2</span>
        </th:block>
      </nav>

      <!-- Cabeçalho ───────────────────────────────────────────────────── -->
      <div class="page-header">
        <h1>Índice de Proposições Legislativas</h1>
        <p
          class="page-subtitle"
          th:text="${'Listando ' + totalItems + ' proposições e matérias do Congresso Nacional — página ' + currentPage + ' de ' + totalPages}"
        >
          Listando proposições e matérias do Congresso Nacional
        </p>
      </div>

      <!-- Lista de proposições ─────────────────────────────────────────── -->
      <ul class="proposicao-list" th:if="${!items.isEmpty()}">
        <li class="proposicao-item" th:each="item : ${items}">
          <div class="item-header">
            <a
              class="item-title"
              th:href="${item.url()}"
              th:text="${item.titulo()}"
              >PL 1441/2024</a
            >
            <span
              th:class="${'badge ' + (item.slugId().startsWith('camara') ? 'badge-camara' : 'badge-senado')}"
              th:text="${item.casaLabel()}"
              >Câmara dos Deputados</span
            >
          </div>
          <p class="item-ementa" th:text="${item.ementa()}">
            Ementa da proposição.
          </p>
          <p
            class="item-situacao"
            th:if="${item.situacao() != null and !#strings.isEmpty(item.situacao())}"
            th:text="${item.situacao()}"
          >
            Situação
          </p>
        </li>
      </ul>

      <!-- Paginação ──────────────────────────────────────────────────── -->
      <nav class="pagination" aria-label="Paginação" th:if="${totalPages > 1}">
        <a
          th:if="${!#strings.isEmpty(prevUrl)}"
          th:href="${prevUrl}"
          aria-label="Página anterior"
          >← Anterior</a
        >
        <span th:if="${#strings.isEmpty(prevUrl)}" class="disabled"
          >← Anterior</span
        >

        <!-- Páginas vizinhas -->
        <th:block th:each="p : ${#numbers.sequence(1, totalPages)}">
          <th:block th:if="${p >= currentPage - 2 and p <= currentPage + 2}">
            <span
              th:if="${p == currentPage}"
              class="current"
              th:text="${p}"
              aria-current="page"
              >1</span
            >
            <a
              th:if="${p != currentPage}"
              th:href="${p == 1 ? '/proposicoes/indice/' : '/proposicoes/indice/page-' + p + '/'}"
              th:text="${p}"
              >2</a
            >
          </th:block>
        </th:block>

        <a
          th:if="${!#strings.isEmpty(nextUrl)}"
          th:href="${nextUrl}"
          aria-label="Próxima página"
          >Próxima →</a
        >
        <span th:if="${#strings.isEmpty(nextUrl)}" class="disabled"
          >Próxima →</span
        >
      </nav>

      <p
        class="pagination-info"
        th:if="${totalPages > 1}"
        th:text="${'Página ' + currentPage + ' de ' + totalPages + ' — ' + totalItems + ' proposições no total'}"
      >
        Página 1 de N
      </p>

      <!-- Gerado em ───────────────────────────────────────────────────── -->
      <p class="generated-at" th:text="${'Gerado em: ' + geradoEm}">
        Gerado em:…
      </p>
    </div>
  </body>
</html>
