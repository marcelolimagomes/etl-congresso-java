<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
  <!--
  Fragmento: head-seo
  Uso: <th:block th:replace="~{pages/fragments/head-seo :: head(${page})}"/>
-->
  <head th:fragment="head(page)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title th:text="${page.seoTitle}">Proposição Legislativa</title>
    <meta name="description" th:content="${page.seoDescription}" />
    <link rel="canonical" th:href="${page.canonicalUrl}" />

    <!-- Open Graph -->
    <meta property="og:type" content="article" />
    <meta property="og:title" th:content="${page.seoTitle}" />
    <meta property="og:description" th:content="${page.seoDescription}" />
    <meta property="og:url" th:content="${page.canonicalUrl}" />
    <meta
      property="og:image"
      content="https://www.translegis.com.br/og-image.png"
    />
    <meta property="og:site_name" content="Transparência Legislativa" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" th:content="${page.seoTitle}" />
    <meta name="twitter:description" th:content="${page.seoDescription}" />
    <meta
      name="twitter:image"
      content="https://www.translegis.com.br/og-image.png"
    />

    <th:block th:replace="~{fragments/head-global :: common(${globalHead})}"></th:block>

    <!-- Schema.org JSON-LD: Legislation -->
    <script
      type="application/ld+json"
      th:utext="${page.schemaOrgLegislationJson}"
    ></script>

    <!-- Schema.org JSON-LD: BreadcrumbList -->
    <script
      type="application/ld+json"
      th:utext="${page.schemaOrgBreadcrumbJson}"
    ></script>

    <!-- Estilos mínimos para renderização sem JavaScript -->
    <style>
      :root {
        --bg: #f9fafb; --bgc: #fff; --tx: #111827; --txm: #6b7280;
        --bd: #e5e7eb; --hd: #1a4480; --lk: #3b82f6; --sp: #f3f4f6;
      }
      :root.dark {
        --bg: #111827; --bgc: #1f2937; --tx: #f1f5f9; --txm: #9ca3af;
        --bd: #374151; --hd: #60a5fa; --lk: #93c5fd; --sp: #374151;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--tx);
        background: var(--bg);
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }
      h1 {
        color: var(--hd);
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
      }
      h2 {
        color: var(--tx);
        font-size: 1.1rem;
        margin-bottom: 1rem;
      }
      .badge {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .badge-camara {
        background: #dcfce7;
        color: #166534;
      }
      .badge-senado {
        background: #dbeafe;
        color: #1e40af;
      }
      .badge-tramitando {
        background: #dcfce7;
        color: #166534;
      }
      .badge-encerrada {
        background: var(--sp);
        color: var(--txm);
      }
      .badge-neutral {
        background: var(--sp);
        color: var(--txm);
      }
      :root.dark .badge-camara { background: #14532d; color: #86efac; }
      :root.dark .badge-senado { background: #1e3a5f; color: #93c5fd; }
      :root.dark .badge-tramitando { background: #14532d; color: #86efac; }
      .card {
        background: var(--bgc);
        border: 1px solid var(--bd);
        border-radius: 0.75rem;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        font-size: 0.875rem;
        color: var(--txm);
        margin-top: 1rem;
      }
      .meta-item {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }
      .keywords {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      .keyword-badge {
        background: var(--sp);
        color: var(--tx);
        padding: 0.15rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.75rem;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.75rem;
        margin-top: 1.25rem;
      }
      .stat-card {
        background: var(--bg);
        border: 1px solid var(--bd);
        border-radius: 0.75rem;
        padding: 1rem;
      }
      .stat-label {
        font-size: 0.75rem;
        color: var(--txm);
        margin-bottom: 0.35rem;
      }
      .stat-value {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--tx);
      }
      .stat-detail {
        font-size: 0.8rem;
        color: var(--txm);
        margin-top: 0.35rem;
      }
      .section-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--tx);
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--bd);
        padding-bottom: 0.5rem;
      }
      dl.info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      dl.info-grid dt {
        font-size: 0.8rem;
        color: var(--txm);
        margin-bottom: 0.25rem;
      }
      dl.info-grid dd {
        font-size: 0.95rem;
        color: var(--tx);
        margin: 0;
      }
      .author-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--bd);
      }
      .author-item:last-child {
        border-bottom: none;
      }
      .author-name {
        font-weight: 500;
        color: var(--hd);
      }
      .author-meta {
        font-size: 0.8rem;
        color: var(--txm);
      }
      .list-stack {
        display: grid;
        gap: 0.85rem;
      }
      .list-item {
        border: 1px solid var(--bd);
        border-radius: 0.75rem;
        padding: 0.9rem 1rem;
        background: var(--bg);
      }
      .list-title {
        color: var(--hd);
        font-weight: 600;
        text-decoration: none;
      }
      .list-title:hover {
        text-decoration: underline;
      }
      .list-meta {
        font-size: 0.8rem;
        color: var(--txm);
        margin-top: 0.3rem;
      }
      .list-desc {
        font-size: 0.9rem;
        color: var(--tx);
        margin-top: 0.5rem;
      }
      .timeline {
        border-left: 2px solid var(--bd);
        margin-left: 0.75rem;
      }
      .timeline-item {
        position: relative;
        padding: 0 0 1.5rem 2rem;
      }
      .timeline-item:last-child {
        padding-bottom: 0;
      }
      .timeline-dot {
        position: absolute;
        left: -0.75rem;
        top: 0;
        width: 1rem;
        height: 1rem;
        border-radius: 50%;
        background: var(--bgc);
        border: 2px solid var(--lk);
      }
      .timeline-date {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--tx);
      }
      .timeline-desc {
        font-size: 0.9rem;
        color: var(--tx);
        margin-top: 0.25rem;
      }
      .timeline-desp {
        font-size: 0.8rem;
        color: var(--txm);
        margin-top: 0.25rem;
        font-style: italic;
      }
      nav.breadcrumb {
        font-size: 0.875rem;
        color: var(--txm);
        margin-bottom: 1.5rem;
      }
      nav.breadcrumb a {
        color: var(--lk);
        text-decoration: none;
      }
      nav.breadcrumb a:hover {
        text-decoration: underline;
      }
      nav.breadcrumb span.sep {
        margin: 0 0.4rem;
      }
      .btn-primary {
        display: inline-block;
        padding: 0.4rem 1rem;
        background: var(--sp);
        color: var(--hd);
        border-radius: 0.5rem;
        font-size: 0.875rem;
        text-decoration: none;
      }
      .btn-primary:hover {
        background: var(--bd);
      }
      .ementa-text {
        color: var(--tx);
        line-height: 1.6;
      }
      .ementa-detalhada {
        color: var(--tx);
        font-size: 0.875rem;
        line-height: 1.6;
        margin-top: 0.75rem;
      }
      .tbtn {
        position: fixed; top: 1rem; right: 1rem; z-index: 100;
        background: var(--bgc); border: 1px solid var(--bd);
        border-radius: 9999px; width: 2.5rem; height: 2.5rem;
        cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.15);
        display: flex; align-items: center; justify-content: center;
      }
      .ic-s { display: none; } .ic-m { display: block; }
      :root.dark .ic-s { display: block; } :root.dark .ic-m { display: none; }
      @media (max-width: 640px) {
        dl.info-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
</html>
